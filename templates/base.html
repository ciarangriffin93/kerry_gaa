{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}">

  <title>KERRY GAA {% block extra_title %}{% endblock %}</title>
</head>

<body>

<header class="container-fluid">
  <div class="row bg-white py-2 d-none d-lg-flex">

    <!-- LOGO -->
    <div class="col-lg-4 text-center text-lg-start">
      <a href="{% url 'home' %}" class="nav-link">
        <h2 class="m-0"><strong>Kerry</strong> GAA</h2>
      </a>
    </div>

    <!-- SEARCH -->
    <div class="col-lg-4">
      <form method="GET">
        <div class="input-group">
          <input class="form-control" type="text" name="q" placeholder="Search">
          <button class="btn btn-dark" type="submit">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </form>
    </div>

    <!-- USER -->
    <div class="col-lg-4 text-end">
      <ul class="list-inline m-0">

        <li class="list-inline-item dropdown">
          <a class="nav-link" href="#" data-bs-toggle="dropdown">
            <i class="fas fa-user"></i>
            <p class="m-0">Account</p>
          </a>

          <div class="dropdown-menu">

            {% if request.user.is_authenticated %}
              <a href="{% url 'profile' request.user.id %}" class="dropdown-item">My Profile</a>
              <a href="{% url 'account_logout' %}" class="dropdown-item">Logout</a>
            {% else %}
              <a href="{% url 'account_signup' %}" class="dropdown-item">Register</a>
              <a href="{% url 'account_login' %}" class="dropdown-item">Login</a>
            {% endif %}

          </div>
        </li>

      </ul>
    </div>

  </div>
</header>

{% block content %}
{% endblock %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}
{% endblock %}

</body>
</html>
